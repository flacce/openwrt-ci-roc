name: reusable-openwrt-build

on:
  workflow_call:
    inputs:
      repo_url:
        required: true
        type: string
      repo_branch:
        required: true
        type: string
      config_file:
        required: true
        type: string
      general_config_file:
        required: false
        type: string
        default: configs/General.config
      diy_script:
        required: false
        type: string
        default: scripts/Roc-script.sh
      firmware_tag:
        required: true
        type: string
      firmware_release:
        required: false
        type: boolean
        default: true
      upload_bin_dir:
        required: false
        type: boolean
        default: false
      tz:
        required: false
        type: string
        default: Asia/Shanghai
      target_profile:
        required: true
        type: string
      cleanup_workflow_runs:
        required: false
        type: boolean
        default: false

jobs:
  Build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.target_profile }}
      cancel-in-progress: true
    env:
      REPO_URL: ${{ inputs.repo_url }}
      REPO_BRANCH: ${{ inputs.repo_branch }}
      CONFIG_FILE: ${{ inputs.config_file }}
      GENERAL_CONFIG_FILE: ${{ inputs.general_config_file }}
      DIY_SCRIPT: ${{ inputs.diy_script }}
      FIRMWARE_RELEASE: ${{ inputs.firmware_release }}
      FIRMWARE_TAG: ${{ inputs.firmware_tag }}
      TZ: ${{ inputs.tz }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Initialization Environment(初始化环境)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        retry() {
          local n=1
          local max=3
          local delay=20
          while true; do
            "$@" && break || {
              if [ $n -lt $max ]; then
                n=$((n+1))
                echo "Command failed. Retry $n/$max in ${delay}s..."
                sleep $delay
              else
                echo "Command failed after $max attempts."
                return 1
              fi
            }
          done
        }
        retry sudo -E apt-get -y update
        retry sudo -E apt-get -y install $(curl -fsSL ophub.org/ubuntu2404-make-openwrt-depends)
        sudo timedatectl set-timezone "$TZ"

    - name: Checkout(检出代码)
      uses: actions/checkout@v4

    - name: Clone Source Code(克隆源代码)
      run: |
        retry() {
          local n=1
          local max=3
          local delay=20
          while true; do
            "$@" && break || {
              if [ $n -lt $max ]; then
                n=$((n+1))
                echo "Command failed. Retry $n/$max in ${delay}s..."
                sleep $delay
              else
                echo "Command failed after $max attempts."
                return 1
              fi
            }
          done
        }
        df -hT $GITHUB_WORKSPACE
        sudo mkdir -p /mnt/openwrt
        sudo chown -R $(id -u):$(id -g) /mnt/openwrt
        retry git clone --depth 1 -b $REPO_BRANCH --single-branch $REPO_URL /mnt/openwrt
        cd /mnt/openwrt
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
        VERSION_INFO=$(git show -s --date=short --format="主源码提交者: %an<br/>时间: %cd<br/>内容: %s<br/>hash: %H")
        echo "VERSION_INFO=$VERSION_INFO" >> $GITHUB_ENV
        KERNEL_FILE=$(find target/linux/generic -maxdepth 1 -type f -name 'kernel-*' | sort -V | tail -n1)
        VERSION_KERNEL=""
        if [ -n "${KERNEL_FILE:-}" ]; then
          VERSION_KERNEL=$(grep -oP 'LINUX_KERNEL_HASH-\K[0-9]+\.[0-9]+\.[0-9]+' "$KERNEL_FILE" | head -n1 || true)
        fi
        if [ -z "$VERSION_KERNEL" ] && [ -f include/kernel-version.mk ]; then
          VERSION_KERNEL=$(grep -oP 'KERNEL_PATCHVER:=\K[0-9]+\.[0-9]+' include/kernel-version.mk | head -n1 || true)
        fi
        VERSION_KERNEL=${VERSION_KERNEL:-unknown}
        echo "VERSION_KERNEL=$VERSION_KERNEL" >> $GITHUB_ENV

    - name: Generate Variables(生成变量)
      run: |
        SOURCE_REPO="$(basename "$REPO_URL" .git)"
        echo "SOURCE_REPO=$SOURCE_REPO" >> $GITHUB_ENV
        DEVICE_TARGET=$(grep '^CONFIG_TARGET_BOARD=' "$CONFIG_FILE" | awk -F '"' '{print $2}')
        echo "DEVICE_TARGET=$DEVICE_TARGET" >> $GITHUB_ENV
        DEVICE_SUBTARGET=$(grep '^CONFIG_TARGET_SUBTARGET=' "$CONFIG_FILE" | awk -F '"' '{print $2}')
        echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET" >> $GITHUB_ENV

    - name: Cache DL Packages(缓存下载依赖)
      uses: actions/cache@v4
      with:
        key: dl-${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ inputs.target_profile }}-${{ hashFiles(inputs.config_file, inputs.general_config_file, inputs.diy_script) }}
        restore-keys: |
          dl-${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ inputs.target_profile }}-
          dl-${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-
        path: ${{ env.OPENWRT_PATH }}/dl

    - name: Cache Compiler Output(缓存编译产物)
      uses: actions/cache@v4
      with:
        key: ccache-${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ inputs.target_profile }}
        restore-keys: |
          ccache-${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ inputs.target_profile }}-
          ccache-${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-
        path: ${{ env.OPENWRT_PATH }}/.ccache

    - name: Cache Toolchain(缓存工具链)
      uses: actions/cache@v4
      with:
        key: staging-${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.VERSION_KERNEL }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ inputs.target_profile }}-${{ hashFiles(inputs.config_file, inputs.general_config_file, inputs.diy_script) }}
        restore-keys: |
          staging-${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.VERSION_KERNEL }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ inputs.target_profile }}-
          staging-${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.VERSION_KERNEL }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-
          staging-${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-
        path: |
          ${{ env.OPENWRT_PATH }}/staging_dir

    - name: Refresh The Cache(刷新缓存)
      run: |
        if [ -d "$OPENWRT_PATH/staging_dir" ]; then
          find "$OPENWRT_PATH/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
              find "$dir" -type f -exec touch {} +
          done
        fi

    - name: Install Feeds(安装feeds)
      run: |
        retry() {
          local n=1
          local max=3
          local delay=20
          while true; do
            "$@" && break || {
              if [ $n -lt $max ]; then
                n=$((n+1))
                echo "Command failed. Retry $n/$max in ${delay}s..."
                sleep $delay
              else
                echo "Command failed after $max attempts."
                return 1
              fi
            }
          done
        }
        cd $OPENWRT_PATH
        retry ./scripts/feeds update -a
        retry ./scripts/feeds install -a

    - name: Load Custom Configuration(加载自定义配置)
      run: |
        chmod +x $DIY_SCRIPT
        cd $OPENWRT_PATH
        $GITHUB_WORKSPACE/$DIY_SCRIPT

    - name: Download DL Package(下载DL软件包)
      run: |
        retry() {
          local n=1
          local max=3
          local delay=20
          while true; do
            "$@" && break || {
              if [ $n -lt $max ]; then
                n=$((n+1))
                echo "Command failed. Retry $n/$max in ${delay}s..."
                sleep $delay
              else
                echo "Command failed after $max attempts."
                return 1
              fi
            }
          done
        }
        cat $CONFIG_FILE $GENERAL_CONFIG_FILE > $OPENWRT_PATH/.config
        cd $OPENWRT_PATH
        make defconfig
        retry make download -j$(nproc)
        PACKAGES=$(grep -E '^CONFIG_PACKAGE_(luci-app-|luci-theme-|mosdns|sing-box|lucky)' .config | grep '=y' | grep -v 'luci-i18n' | sed -e 's/CONFIG_PACKAGE_//g' -e 's/=y//g' | xargs | awk '{print $0}' | sed 's/ /, /g' || true)
        echo "PACKAGES=$PACKAGES" >> $GITHUB_ENV

    - name: Compile Firmware(开始编译固件)
      id: compile
      run: |
        cd $OPENWRT_PATH
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y.%m.%d")" >> $GITHUB_ENV

    - name: Save Build Logs On Failure(失败时保存日志)
      if: failure()
      run: |
        mkdir -p $GITHUB_WORKSPACE/debug-logs
        if [ -n "${OPENWRT_PATH:-}" ] && [ -d "$OPENWRT_PATH" ]; then
          cp -f $OPENWRT_PATH/.config $GITHUB_WORKSPACE/debug-logs/ 2>/dev/null || true
          cp -f $OPENWRT_PATH/.config.old $GITHUB_WORKSPACE/debug-logs/ 2>/dev/null || true
          find $OPENWRT_PATH -maxdepth 5 -type f -name '*.log' -exec cp -f {} $GITHUB_WORKSPACE/debug-logs/ \; 2>/dev/null || true
        fi

    - name: Upload Failure Logs Artifact(上传失败日志)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.FIRMWARE_TAG }}-failure-logs-${{ github.run_number }}
        path: ${{ github.workspace }}/debug-logs
        if-no-files-found: warn

    - name: Check Space Usage(检查空间使用情况)
      if: (!cancelled())
      run: df -hT

    - name: Upload Bin Directory(上传固件)
      if: steps.compile.outputs.status == 'success' && inputs.upload_bin_dir
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.SOURCE_REPO }}-bin-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ env.FILE_DATE }}
        path: ${{ env.OPENWRT_PATH }}/bin

    - name: Organize Files(整理文件)
      if: steps.compile.outputs.status == 'success'
      run: |
        shopt -s nullglob
        cd $OPENWRT_PATH/bin/targets/*/*
        manifest_file=""
        manifest_files=( *.manifest )
        if [ ${#manifest_files[@]} -gt 0 ]; then
          manifest_file="${manifest_files[0]}"
        fi
        case "${{ inputs.target_profile }}" in
          jdcloud)
            cp $OPENWRT_PATH/.config Arthur.Athena.config
            mv config.buildinfo Arthur.Athena.config.buildinfo
            [ -n "$manifest_file" ] && mv "$manifest_file" Arthur.Athena.manifest
            tar_name="Arthur.Athena.Packages.tar.gz"
            ;;
          jdcloud_nowifi)
            cp $OPENWRT_PATH/.config Arthur.Athena.Taiyi.NoWiFi.config
            mv config.buildinfo Arthur.Athena.Taiyi.NoWiFi.config.buildinfo
            [ -n "$manifest_file" ] && mv "$manifest_file" Arthur.Athena.Taiyi.NoWiFi.manifest
            tar_name="Arthur.Athena.Taiyi.NoWiFi.Packages.tar.gz"
            for file in *qualcommax*.bin; do
              mv "$file" "${file//qualcommax/nowifi}"
            done
            ;;
          ipq60xx)
            cp $OPENWRT_PATH/.config IPQ60XX.config
            mv config.buildinfo IPQ60XX.config.buildinfo
            [ -n "$manifest_file" ] && mv "$manifest_file" IPQ60XX.manifest
            tar_name="IPQ60XX.Packages.tar.gz"
            ;;
          *)
            echo "Unsupported target_profile: ${{ inputs.target_profile }}"
            exit 1
            ;;
        esac
        apk_files=( $OPENWRT_PATH/bin/packages/*/*/*.apk )
        if [ ${#apk_files[@]} -gt 0 ]; then
          mkdir -p packages
          mv -f "${apk_files[@]}" packages/
          tar -zcf "$tar_name" packages
        else
          echo "No APK packages found, skipping package archive."
        fi
        rm -rf packages
        rm -f feeds.buildinfo version.buildinfo sha256sums profiles.json
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

    - name: Upload Firmware To Artifact(将固件上传到Artifact)
      if: steps.compile.outputs.status == 'success' && !inputs.firmware_release
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.SOURCE_REPO }}-firmware-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE_PATH }}

    - name: Upload Firmware To Release(发布固件)
      id: release_upload
      if: steps.compile.outputs.status == 'success' && inputs.firmware_release
      continue-on-error: true
      uses: ncipollo/release-action@v1
      with:
        name: ${{ env.DATE }} for ${{ env.FIRMWARE_TAG }}
        allowUpdates: true
        tag: ${{ env.FIRMWARE_TAG }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: ${{ env.FIRMWARE_PATH }}/*
        body: |
          **This is OpenWrt Firmware for ${{ env.FIRMWARE_TAG }}**
          ### 📒 固件信息
          - 👤 发布维护: [@${{ github.repository_owner }}](https://github.com/${{ github.repository_owner }})
          - 🚀 发布仓库: https://github.com/${{ github.repository }}/releases
          - 🔌 已安装的插件及主题：
          - **${{ env.PACKAGES }}**
          - 💻 这是 ${{ env.FIRMWARE_TAG }} 平台使用的 OpenWrt 固件
          - ⚽ 固件源码: ${{ env.REPO_URL }}
          - 💝 源码分支: ${{ env.REPO_BRANCH }}
          - 🌐 默认地址: **10.0.0.1**
          - 🔑 默认密码: none
          ### 🧊 固件版本
          - 固件内核版本：**${{ env.VERSION_KERNEL }}**
          - 固件编译前最后一次➦[主源码](${{ env.REPO_URL }})更新记录
          - ${{ env.VERSION_INFO }}

    - name: Retry Release Upload On Transient Failure(失败后重试发布)
      if: steps.compile.outputs.status == 'success' && inputs.firmware_release && steps.release_upload.outcome == 'failure'
      uses: ncipollo/release-action@v1
      with:
        name: ${{ env.DATE }} for ${{ env.FIRMWARE_TAG }}
        allowUpdates: true
        tag: ${{ env.FIRMWARE_TAG }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: ${{ env.FIRMWARE_PATH }}/*
        body: |
          **This is OpenWrt Firmware for ${{ env.FIRMWARE_TAG }}**
          ### 📒 固件信息
          - 👤 发布维护: [@${{ github.repository_owner }}](https://github.com/${{ github.repository_owner }})
          - 🚀 发布仓库: https://github.com/${{ github.repository }}/releases
          - 🔌 已安装的插件及主题：
          - **${{ env.PACKAGES }}**
          - 💻 这是 ${{ env.FIRMWARE_TAG }} 平台使用的 OpenWrt 固件
          - ⚽ 固件源码: ${{ env.REPO_URL }}
          - 💝 源码分支: ${{ env.REPO_BRANCH }}
          - 🌐 默认地址: **10.0.0.1**
          - 🔑 默认密码: none
          ### 🧊 固件版本
          - 固件内核版本：**${{ env.VERSION_KERNEL }}**
          - 固件编译前最后一次➦[主源码](${{ env.REPO_URL }})更新记录
          - ${{ env.VERSION_INFO }}

    - name: Delete Old Workflows(删除旧工作流)
      if: inputs.cleanup_workflow_runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        retain_days: 2
        keep_minimum_runs: 0
